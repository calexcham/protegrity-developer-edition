# ──────────────────────────────────────────────────────────────────────
# Banking Portal Chatbot — Docker Compose
#
# Prerequisites (handled by start.sh):
#   The Protegrity Developer Edition must be running first, which
#   creates the `protegrity-network` Docker network.
#
# Usage:
#   ./start.sh                  # recommended — checks Protegrity first
#   docker compose up --build   # manual (Protegrity must already be up)
#   docker compose down         # stop both apps
#   docker compose logs -f      # stream all logs
# ──────────────────────────────────────────────────────────────────────

name: banking-portal

# ── Shared network — created by Protegrity Developer Edition ──────────
networks:
  protegrity-network:
    external: true
    name: protegrity-network

# ── Persistent volumes ────────────────────────────────────────────────
volumes:
  chroma_db:
    driver: local
  postgres_data:
    driver: local
  kuzu_data:
    driver: local

# ── Services ──────────────────────────────────────────────────────────
services:

  # ── PostgreSQL — banking customer data ────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: banking_postgres
    networks:
      - protegrity-network
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       protegrity
      POSTGRES_USER:     protegrity
      POSTGRES_PASSWORD: protegrity
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protegrity -d protegrity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Technical App (admin / orchestration demo portal) — port 5002 ──
  technical-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: banking-portal-app:latest
    container_name: technical_app
    networks:
      - protegrity-network
    ports:
      - "5002:5002"
    env_file:
      - .env          # loads LLM keys, Protegrity credentials, etc.
    environment:
      # Identity
      APP_TYPE: "technical"
      TECH_PORT: "5002"
      # Protegrity feature toggles (both enabled by default)
      GUARDRAIL_ENABLED: "true"
      DISCOVERY_ENABLED: "true"
      # Override localhost Protegrity URLs from .env with internal Docker hostnames
      PROTEGRITY_HOST: "http://classification_service:8050"
      CLASSIFY_URL: "http://classification_service:8050/pty/data-discovery/v1.1/classify"
      DETOKENIZE_URL: "http://classification_service:8050/pty/data-discovery/v1.1/unprotect"
      SGR_URL: "http://semantic_guardrail:8001/pty/semantic-guardrail/v1.1/conversations/messages/scan"
      # PostgreSQL — override .env localhost with internal Docker hostname
      DB_HOST: "banking_postgres"
      DB_PORT: "5432"
      DB_NAME: "protegrity"
      DB_USER: "protegrity"
      DB_PASSWORD: "protegrity"
      # KùzuDB — embedded graph database (single-file, Kuzu 0.11+)
      # Seeding is done by the entrypoint before Flask starts; Flask only reads.
      KUZU_DB_PATH: "/app/kuzu_data/banking.kuzu"
      KUZU_READ_ONLY: "true"
      # Flask
      FLASK_SECRET_KEY: "${FLASK_SECRET_KEY:-technical-portal-secret-2026}"
    volumes:
      # Chat histories persist on the host so restarts don't lose them
      - ./TechnicalApp/chat_history_tech:/app/TechnicalApp/chat_history_tech
      # ChromaDB — each container keeps its own local index (avoids file-lock conflicts)
      #            KB files are baked into the image; index rebuilds in <1s on startup
      # KùzuDB — shared with kuzu-explorer for GUI browser; technical-app seeds it
      - kuzu_data:/app/kuzu_data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5002/tech/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Business Customer App (customer-facing portal) — port 5003 ──────
  business-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: banking-portal-app:latest
    container_name: business_app
    networks:
      - protegrity-network
    ports:
      - "5003:5003"
    env_file:
      - .env
    environment:
      # Identity
      APP_TYPE: "business"
      BUSINESS_PORT: "5003"
      # Business app always uses LangGraph
      ORCHESTRATOR: "langgraph"
      # Override localhost Protegrity URLs from .env with internal Docker hostnames
      PROTEGRITY_HOST: "http://classification_service:8050"
      CLASSIFY_URL: "http://classification_service:8050/pty/data-discovery/v1.1/classify"
      DETOKENIZE_URL: "http://classification_service:8050/pty/data-discovery/v1.1/unprotect"
      SGR_URL: "http://semantic_guardrail:8001/pty/semantic-guardrail/v1.1/conversations/messages/scan"
      # PostgreSQL — override .env localhost with internal Docker hostname
      DB_HOST: "banking_postgres"
      DB_PORT: "5432"
      DB_NAME: "protegrity"
      DB_USER: "protegrity"
      DB_PASSWORD: "protegrity"
      # KùzuDB — read-only (technical-app seeds the graph; business-app only reads)
      KUZU_DB_PATH: "/app/kuzu_data/banking.kuzu"
      KUZU_READ_ONLY: "true"
      # Flask
      FLASK_SECRET_KEY: "${FLASK_SECRET_KEY:-banking-cloud-portal-secret-2026}"
    volumes:
      - ./BusinessCustomerApp/chat_history:/app/BusinessCustomerApp/chat_history
      # ChromaDB — own local index (see note in technical-app)
      # KùzuDB — shared read-only; technical-app must be healthy before this starts
      - kuzu_data:/app/kuzu_data
    depends_on:
      postgres:
        condition: service_healthy
      technical-app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5003/bank/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Kuzu Explorer — graph browser GUI — port 8000 ──────────────────
  kuzu-explorer:
    build:
      context: .
      dockerfile: docker/kuzu-explorer/Dockerfile
    container_name: kuzu_explorer
    networks:
      - protegrity-network
    ports:
      - "8000:8000"
    environment:
      # KUZU_DIR is the directory containing the DB file (default /database, matches volume mount)
      # KUZU_FILE is the filename within that directory
      KUZU_DIR: /database
      KUZU_FILE: banking.kuzu
      MODE: READ_ONLY
    volumes:
      - kuzu_data:/database
    depends_on:
      technical-app:
        condition: service_healthy
    restart: unless-stopped

  # ── pgweb — PostgreSQL browser GUI — port 8081 ─────────────────────
  pgweb:
    image: sosedoff/pgweb:latest
    container_name: banking_pgweb
    networks:
      - protegrity-network
    ports:
      - "8081:8081"
    environment:
      PGWEB_DATABASE_URL: "postgres://protegrity:protegrity@banking_postgres:5432/protegrity?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
